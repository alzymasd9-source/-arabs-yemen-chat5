<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات فلة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#f5f5f5;--top:#1a1a2e;--chat:#fff;--me:#00aaff;--other:#f1f1f1;--text:#333}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hide{display:none!important}
button{cursor:pointer;border:none;background:none}
.topbar{background:var(--top);height:55px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;color:#fff}
.topbar .center{display:flex;align-items:center;gap:18px;font-size:20px}
.topbar .right img{width:38px;height:38px;border-radius:50%;border:2px solid #00aaff}
.messages{flex:1;overflow-y:auto;padding:10px;background:var(--bg)}
.msg-row{display:flex;gap:8px;margin:12px 0;align-items:flex-start}
.msg-row.me{flex-direction:row-reverse}
.msg-avatar{width:45px;height:45px;border-radius:50%;object-fit:cover}
.msg-body{max-width:70%}
.msg-time{font-size:11px;color:#999;margin-bottom:3px}
.msg-name{font-size:13px;font-weight:700;margin-bottom:3px;text-align:right}
.msg-text{background:var(--other);padding:8px 12px;border-radius:15px;font-size:15px}
.msg-row.me .msg-text{background:var(--me);color:#fff;border-radius:15px 0 15px 15px}
.msg-row.other .msg-text{border-radius:0 15px 15px 15px}
.vip-tag{color:#e91e63;font-size:12px}
.inputbar{background:var(--chat);padding:8px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid #ddd}
.inputbar input{flex:1;padding:12px 15px;border-radius:25px;border:1px solid #ddd;background:#f5f5f5;outline:none}
.inputbar i{font-size:22px;color:#666;padding:8px}
.send-btn{background:var(--top);color:#fff;width:45px;height:45px;border-radius:50%;display:grid;place-items:center}
.footer{background:var(--top);height:55px;display:flex;align-items:center;justify-content:space-around;color:#fff;font-size:20px}
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:20;display:flex;align-items:center;justify-content:center}
.popup-box{background:#fff;width:340px;max-width:95%;border-radius:15px;padding:20px;text-align:center;color:#000}
.popup-box input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;color:#000;outline:none;text-align:center}
.btn-main{width:100%;padding:12px;border-radius:10px;background:var(--me);color:#fff;font-weight:700;margin-top:5px}
.user-item{display:flex;align-items:center;gap:10px;padding:10px;background:#f5f5f5;border-radius:8px;margin:5px 0}
</style>
</head>
<body>

<div id="start_page" style="width:100vw;height:100vh;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;color:#fff;text-align:center">
  <h1 style="font-size:32px">شات فلة</h1>
  <button type="button" class="btn-main" id="guest_btn" style="width:280px">دخول كزائر</button>
  <button type="button" class="btn-main" id="login_btn" style="width:280px;background:#333">دخول الأعضاء</button>
  <button type="button" class="btn-main" id="register_btn" style="width:280px;background:#333">تسجيل</button>
</div>

<div id="chat_page" class="hide" style="flex:1;display:flex;flex-direction:column;height:100vh">
  <div class="topbar">
    <div class="center">
      <button type="button" id="store_btn"><i class="fa fa-store"></i></button>
      <button type="button"><i class="fa fa-envelope"></i></button>
      <button type="button"><i class="fa fa-users" id="users_btn"></i></button>
    </div>
    <div class="right"><img id="my_avatar_img" src="https://i.pravatar.cc/100"></div>
  </div>
  <div class="messages" id="messages_box"></div>
  <div class="inputbar">
    <input type="text" id="msg_input" placeholder="اكتب هنا...">
    <button type="button" class="send-btn" id="send_btn"><i class="fa fa-paper-plane"></i></button>
  </div>
  <div class="footer">
    <button type="button"><i class="fa fa-house" id="home_btn"></i></button>
  </div>
</div>

<div class="popup-overlay hide" id="guest_popup"><div class="popup-box">
  <h3>دخول كزائر</h3><input type="text" id="guest_name" placeholder="اكتب اسمك هنا">
  <button type="button" class="btn-main" id="guest_enter">دخول</button>
</div></div>

<div class="popup-overlay hide" id="login_popup"><div class="popup-box">
  <h3>دخول الأعضاء</h3><input type="text" id="login_user" placeholder="اسم المستخدم"><input type="password" id="login_pass" placeholder="الباسورد">
  <button type="button" class="btn-main" id="login_submit">دخول</button>
</div></div>

<div class="popup-overlay hide" id="register_popup"><div class="popup-box">
  <h3>انشاء حساب</h3><input type="text" id="reg_user" placeholder="اسم المستخدم"><input type="password" id="reg_pass" placeholder="الباسورد"><input type="email" id="reg_email" placeholder="البريد">
  <button type="button" class="btn-main" id="reg_submit">حفظ</button>
</div></div>

<div class="popup-overlay hide" id="users_popup"><div class="popup-box" style="width:400px;max-height:80vh;overflow-y:auto">
  <h3>المتصلون</h3><div id="users_list"></div>
</div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
window.onload = function(){
const $ = id => document.getElementById(id);
let myName = 'زائر', myId = null, isAdmin=false, isVip=false;
const colors = ['#e91e63','#00aaff','#ff9800','#9c27b0','#009688','#f44336'];
const getColor = name => colors[name.charCodeAt(0) % colors.length];

// التعديل المهم حق Render + HTTPS
let socket = io(window.location.origin, {transports: ['websocket', 'polling']}); 
socket.on('connect_error', (err)=>{alert('خطأ اتصال: '+err.message); console.log(err);});

$('guest_btn').onclick = (e) => { e.preventDefault(); $('guest_popup').classList.remove('hide'); }
$('login_btn').onclick = (e) => { e.preventDefault(); $('login_popup').classList.remove('hide'); }
$('register_btn').onclick = (e) => { e.preventDefault(); $('register_popup').classList.remove('hide'); }

$('guest_enter').onclick = (e) => {
  e.preventDefault();
  myName=$('guest_name').value.trim()||'زائر'+Math.floor(Math.random()*999);
  socket.emit('joinGuest',{name:myName},enter);
}
$('login_submit').onclick = (e) => {
  e.preventDefault();
  const n=$('login_user').value.trim(), p=$('login_pass').value;
  if(!n||!p) return alert('اكتب اسم وباسورد');
  socket.emit('login',{name:n,pass:p},enter);
}
$('reg_submit').onclick = (e) => {
  e.preventDefault();
  const n=$('reg_user').value.trim(), p=$('reg_pass').value, e=$('reg_email').value;
  if(!n||!p) return alert('اكتب اسم وباسورد');
  socket.emit('register',{name:n,pass:p,email:e},r=>{alert(r.msg||'تم التسجيل +100 نقطة');if(r.ok)$('register_popup').classList.add('hide');});
}

function enter(r){
  if(!r.ok) return alert(r.msg);
  $('guest_popup').classList.add('hide');$('login_popup').classList.add('hide');$('register_popup').classList.add('hide');
  $('start_page').classList.add('hide');$('chat_page').classList.remove('hide');
  myId=r.user.id; isAdmin=r.user.isAdmin; isVip=r.user.isVip; myName=r.user.name;
  $('my_avatar_img').src = `https://i.pravatar.cc/100?u=${myName}`;
  r.chatHistory.forEach(m=>addMsg(m));
}

function send(type,content){
  socket.emit('message',{type,content});
  if(type==='text') addMsg({user:{name:myName,id:myId},content,type,time:new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})+' 16/05'});
}
$('send_btn').onclick = (e)=>{e.preventDefault(); const m=$('msg_input').value.trim(); if(m){send('text',m);$('msg_input').value='';}};
$('msg_input').onkeypress=e=>{if(e.key==='Enter')$('send_btn').click();};

function addMsg(m){
  const d=document.createElement('div');
  const isMe = m.user.id===myId;
  d.className='msg-row '+(isMe?'me':'other');
  const color = getColor(m.user.name);
  d.innerHTML=`
    <img class="msg-avatar" src="https://i.pravatar.cc/100?u=${m.user.name}">
    <div class="msg-body">
      <div class="msg-time">${m.time||'17:15 16/05'}</div>
      <div class="msg-name" style="color:${color}">${m.user.isAdmin?'\"*'+m.user.name+'*\"':m.user.name} ${m.user.isVip?'<span class="vip-tag">[ مميز ]</span>':''}</div>
      <div class="msg-text">${m.content}</div>
    </div>
  `;
  $('messages_box').appendChild(d); $('messages_box').scrollTop=99999;
}

socket.on('you are', d=>{myId=d.id; isAdmin=d.isAdmin; isVip=d.isVip; d.chatHistory.forEach(m=>addMsg(m));});
socket.on('message', d=>{ if(d.user.id!==myId) addMsg(d); });
socket.on('system', m=>{ const d=document.createElement('div'); d.style.textAlign='center'; d.style.color='#e91e63'; d.style.margin='10px'; d.innerHTML=m; $('messages_box').appendChild(d); });

$('users_btn').onclick=(e)=>{ e.preventDefault(); $('users_popup').classList.remove('hide'); socket.emit('get users'); }
$('home_btn').onclick=(e)=>{ e.preventDefault(); $('chat_page').classList.add('hide');$('start_page').classList.remove('hide'); }
document.querySelectorAll('.popup-overlay').forEach(p => p.onclick = e => { if(e.target===p) p.classList.add('hide'); });

}
</script>
</body>
</html>
