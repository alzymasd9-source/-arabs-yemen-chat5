<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن المطور</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginPage" class="page">
  <h2>موقع شات اليمن المطور</h2>
  <div class="tabs">
    <button onclick="showTab('guest')">دخول زوار 👤</button>
    <button onclick="showTab('member')">دخول أعضاء</button>
    <button onclick="showTab('register')">تسجيل جديد</button>
  </div>

  <div id="guest" class="tab">
    <input id="guestName" placeholder="اكتب اسمك">
    <select id="guestGender">
      <option value="male">ذكر</option>
      <option value="female">أنثى</option>
      <option value="other">آخر</option>
    </select>
    <button onclick="guestLogin()">دخول</button>
  </div>

  <div id="member" class="tab hidden">
    <input id="loginUser" placeholder="اسم المستخدم">
    <input id="loginPass" type="password" placeholder="كلمة السر">
    <button onclick="memberLogin()">دخول</button>
  </div>

  <div id="register" class="tab hidden">
    <input id="regUser" placeholder="اسم المستخدم">
    <input id="regEmail" placeholder="البريد يقبل الوهمي">
    <input id="regPass" type="password" placeholder="كلمة السر">
    <button onclick="register()">تسجيل</button>
  </div>
</div>

<div id="roomsPage" class="page hidden">
  <h3>اختر الغرفة</h3>
  <div class="room" onclick="enterRoom('العامة')">العامة</div>
  <div class="room" onclick="enterRoom('اليمن')">اليمن</div>
  <div class="room" onclick="enterRoom('مصر')">مصر</div>
  <div class="room" onclick="enterRoom('الجزائر')">الجزائر</div>
</div>

<div id="chatPage" class="page hidden">
  <header class="topbar">
    <span>☰ قائمة</span>
    <span>🛒 Store</span>
    <span>✉️ خاص</span>
    <span>👥 متواجدين</span>
    <span id="myAvatar" onclick="toggleProfileMenu()"></span>
  </header>

  <div id="messages" class="messages"></div>

  <div class="chatInput">
    <button>+</button>
    <button>🫥</button>
    <input id="msgInput" placeholder="اكتب هنا...">
    <button>🎤</button>
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
