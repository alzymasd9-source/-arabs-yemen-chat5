<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>شات اليمن المطور</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
    <h1>شات اليمن المطور</h1>
    <button id="show-login">تسجيل الدخول / تسجيل حساب</button>
    <button id="logout" style="display:none;">تسجيل خروج</button>
</header>

<!-- نافذة تسجيل الدخول / التسجيل -->
<div id="auth-modal" class="modal">
  <div class="modal-content">
    <span class="close" id="close-auth">&times;</span>
    <h2>تسجيل الدخول / حساب جديد</h2>
    <input type="text" id="auth-username" placeholder="اسم المستخدم" />
    <input type="password" id="auth-password" placeholder="الباسور" />
    <select id="auth-action">
      <option value="login">تسجيل الدخول</option>
      <option value="register">حساب جديد</option>
    </select>
    <button id="auth-submit">إرسال</button>
  </div>
</div>

<!-- قسم الدردشة -->
<div id="chat-section" style="display:none;">
  <div id="user-info">
    <p>مرحباً، <span id="user-name"></span></p>
    <p>الرتبة: <span id="user-rank"></span></p>
  </div>
  <div id="members-list">
    <h3>الأعضاء المتصلين</h3>
    <ul id="members"></ul>
  </div>
  <div id="chat-box">
    <h3>الدردشة</h3>
    <div id="messages"></div>
    <div id="message-inputs">
      <textarea id="message" placeholder="اكتب رسالتك هنا..."></textarea>
      <button id="send-message">إرسال</button>
    </div>
  </div>
  <button id="leave-chat">خروج من الشات</button>
</div>

<!-- أنماط CSS مخصصة -->
<link rel="stylesheet" href="style.css" />

<script src="script.js"></script>
</body>
</html>
