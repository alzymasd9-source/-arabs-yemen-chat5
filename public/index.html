<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن العربي</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage" class="page active">
  <div class="login-box">
    <h1>شات اليمن العربي</h1>
    <div class="login-section">
      <button class="btn-main" onclick="showGuestForm()">دخول الزوار</button>
      <div id="guestForm" class="hidden">
        <div class="input-group">
          <input id="guestName" placeholder="اكتب اسمك هنا">
          <div class="gender-select">
            <button onclick="toggleGenderList()">الجنس ▼</button>
            <div id="genderList" class="hidden">
              <div onclick="selectGender('ذكر','blue')">ذكر</div>
              <div onclick="selectGender('انثى','pink')">انثى</div>
              <div onclick="selectGender('آخر','white')">آخر</div>
            </div>
          </div>
        </div>
        <button class="btn-main" onclick="guestLogin()">دخول</button>
      </div>
    </div>
    <hr>
    <div class="login-section">
      <button class="btn-main" onclick="toggleBox('memberForm')">دخول الأعضاء</button>
      <div id="memberForm" class="hidden">
        <input id="memberName" placeholder="اسم المستخدم">
        <input id="memberPass" type="password" placeholder="الباسورد">
        <button class="btn-main" onclick="memberLogin()">دخول</button>
      </div>
    </div>
    <hr>
    <div class="login-section">
      <button class="btn-main" onclick="toggleBox('registerForm')">تسجيل</button>
      <div id="registerForm" class="hidden">
        <input id="regName" placeholder="اسم المستخدم">
        <input id="regPass" type="password" placeholder="الباسورد">
        <input id="regEmail" type="email" placeholder="البريد الالكتروني">
        <button class="btn-main" onclick="register()">انشاء حساب</button>
      </div>
    </div>
  </div>
</div>

<div id="roomsPage" class="page">
  <div class="login-box">
    <h2>اختر الغرفة</h2>
    <div id="roomsList2"></div>
  </div>
</div>

<div id="chatPage" class="page">
  <header class="topbar">
    <div class="topbar-right">
      <span class="icon" onclick="toggleSidebar()">☰</span>
      <span class="icon">Store</span>
      <span class="icon">✉️</span>
      <span class="icon" onclick="showUsers()">👥</span>
      <span class="icon">❤️</span>
    </div>
    <div class="topbar-left">
      <img id="myAvatar" class="avatar" src="" onclick="openProfile()">
    </div>
  </header>
  <div class="chat-wrapper">
    <div id="chatBox"></div>
  </div>
  <footer class="inputbar">
    <span class="icon">+</span>
    <span class="icon">😊</span>
    <input id="messageInput" placeholder="اكتب هنا...">
    <span class="icon">🎤</span>
    <button id="sendBtn" class="send-btn">➤</button>
  </footer>
  <div class="bottombar">
    <span class="icon">🔊</span>
    <span class="icon">▶️</span>
    <span id="roomNameNow">عام</span>
    <span class="icon">⚙️</span>
    <span class="icon" onclick="goHome()">🏠</span>
    <span class="icon" onclick="openProfile()">👤</span>
  </div>
  <div id="sidebar" class="sidebar hidden">
    <div onclick="goRooms()">الغرف</div>
    <div>الإعدادات</div>
    <div onclick="logout()">تسجيل الخروج</div>
  </div>
  <div id="usersSidebar" class="sidebar hidden">
    <input placeholder="🔍 ابحث عن عضو">
    <div id="usersList"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
