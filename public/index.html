<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اليمن</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="app">
  <div id="home" class="center">
    <h1>اليمن</h1>
    <div class="box">
      <h3>دخول زائر</h3>
      <input id="guestName" placeholder="اسمك">
      <select id="guestGender"><option>ذكر</option><option>انثى</option><option>آخر</option></select>
      <select id="guestAge"></select>
      <button onclick="joinGuest()">دخول</button>
      <button onclick="toggleBox('guestBox')">تسجيل/دخول</button>
    </div>
    <div id="guestBox" class="box hidden">
      <h3>تسجيل جديد</h3>
      <input id="regName" placeholder="اسم المستخدم">
      <input id="regPass" type="password" placeholder="كلمة السر">
      <button onclick="register()">تسجيل</button>
      <h3>دخول</h3>
      <input id="loginName" placeholder="اسم المستخدم">
      <input id="loginPass" type="password" placeholder="كلمة السر">
      <button onclick="login()">دخول</button>
    </div>
  </div>
  <div id="roomsPage" class="hidden">
    <header><h2>غرف اليمن</h2><button onclick="logout()">خروج</button></header>
    <div id="roomsList"></div>
  </div>
  <div id="chatPage" class="hidden">
    <header>
      <button onclick="toggleMenu()">☰</button>
      <h2 id="currentRoomName"></h2>
      <button onclick="goHome()">🏠</button>
    </header>
    <div id="sideMenu">
      <button onclick="showProfile()">👤 ملفي</button>
      <button onclick="toggleSound()">🔊 صوت</button>
      <div id="menuRooms"></div>
    </div>
    <div id="messages"></div>
    <div id="chatFooter">
      <span id="usersCount">0</span>
      <input id="msgInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">ارسال</button>
    </div>
  </div>
  <div id="profilePage" class="hidden center">
    <div class="box">
      <div id="myAvatar" class="avatar big"></div>
      <h3 id="pName"></h3>
      <p>العمر: <span id="pAge"></span></p>
      <p>الجنس: <span id="pGender"></span></p>
      <button onclick="hideProfile()">رجوع</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
