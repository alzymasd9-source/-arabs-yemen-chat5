<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقع شات اليمن المطور</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg" style="width: 500px;">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h1 class="mb-2">🇾🇪 شات اليمن</h1>
          <p class="text-muted">منصة شات متطورة وآمنة</p>
        </div>
        
        <!-- تبويبات الدخول -->
        <ul class="nav nav-tabs mb-4" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="visitor-tab" data-bs-toggle="tab" data-bs-target="#visitor">زائر</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="member-tab" data-bs-toggle="tab" data-bs-target="#member">دخول</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register">تسجيل</button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- دخول زوار -->
          <div class="tab-pane fade show active" id="visitor">
            <form id="visitorForm">
              <div class="mb-3">
                <label class="form-label">اسمك</label>
                <input type="text" class="form-control" id="visitorName" placeholder="أدخل اسمك" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">الجنس</label>
                <div class="d-flex gap-2">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="ذكر" checked>
                    <label class="form-check-label">👨 ذكر</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="أنثى">
                    <label class="form-check-label">👩 أنثى</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="آخر">
                    <label class="form-check-label">⚪ آخر</label>
                  </div>
                </div>
              </div>

              <div class="alert alert-info">
                <small>🎲 العمر سيتم توليده عشوائياً من 20 إلى 99</small>
              </div>

              <button type="submit" class="btn btn-primary w-100">دخول كزائر</button>
            </form>
          </div>

          <!-- دخول أعضاء -->
          <div class="tab-pane fade" id="member">
            <form id="memberForm">
              <div class="mb-3">
                <label class="form-label">اسم المستخدم أو البريد</label>
                <input type="text" class="form-control" id="memberUsername" placeholder="أدخل اسم المستخدم" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="memberPassword" placeholder="أدخل كلمة المرور" required>
              </div>

              <button type="submit" class="btn btn-success w-100">دخول</button>
            </form>
          </div>

          <!-- تسجيل عضوية -->
          <div class="tab-pane fade" id="register">
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" class="form-control" id="regUsername" placeholder="اختر اسماً فريداً" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-control" id="regEmail" placeholder="بريدك الإلكتروني" required>
              </div>

              <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="regPassword" placeholder="اختر كلمة قوية" required>
              </div>

              <button type="submit" class="btn btn-warning w-100">تسجيل عضوية</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
