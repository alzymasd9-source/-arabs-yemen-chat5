<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شات اليمن | شات اليمن العربي</title>
    <meta name="description" content="شات اليمن العربي - أكبر تجمع يمني للدردشة والتعارف. ادخل شات بدون تسجيل" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --main: #0f414e; --main-light: #195b86; --green: #74b20e;
            --bg: #ededed; --chat-bg: #e5ddd5; --msg-me: #dcf8c6; --msg-other: #fff;
            --user-font: 'Tajawal'; --user-color: #000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--user-font), sans-serif; color: var(--user-color); }
        body { background: var(--bg); }
        button { cursor: pointer; border: none; }
       .hide { display: none!important; }

        /* ========== صفحة الدخول ========== */
       .header { background-color: var(--main); padding: 10px 0; text-align: center; }
       .header > a { color: #fff; font-size: 28px; font-weight: 700; text-decoration: none; }
       .header b { color: #e6e6fa; font-size: 15px; display: block; }
       .nav { background: rgba(255, 255, 255, 0.13); text-align: center; }
       .nav a { padding: 10px 15px; color: #fff; font-size: 15px; display: inline-block; }
       .main { background: #00242e url(https://i.imgur.com/8KmCThn.jpg) no-repeat center fixed; background-size: cover; min-height: 80vh; padding: 20px 0; }
       .container { max-width: 1050px; margin: auto; text-align: center; }
       .room { margin: 60px auto; max-width: 500px; background: rgba(255, 255, 255, 0.9); border-radius: 15px; padding: 20px; backdrop-filter: blur(5px); }
       .room h3 { color: var(--main-light); font-size: 20px; margin-bottom: 10px; }
       .btn { display: inline-block; margin: 10px 5px; color: #fff; background: var(--main); padding: 12px 25px; border-radius: 10px; font-size: 17px; font-weight: 700; }
        #guest_btn { background: var(--green); }
       .login { display: none; background: rgba(249, 249, 249, 0.95); width: 360px; max-width: 95%; border-radius: 15px; margin: 20px auto; padding: 20px; }
       .login input { width: 100%; padding: 12px; text-align: center; font-size: 18px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
       .gendiv { display: flex; justify-content: center; gap: 30px; margin: 15px auto; }
       .male { color: #06f; }.female { color: #e13; }
       .error { display: none; margin: 10px auto; padding: 10px; background: #fff0f0; color: red; border-radius: 8px; border: 1px solid red; }

        /* ========== واجهة الشات ========== */
        #chat_app { display: none; height: 100vh; max-width: 1200px; margin: auto; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
       .chat-layout { display: flex; height: 100%; }

       .sidebar { width: 320px; border-left: 1px solid #ddd; display: flex; flex-direction: column; background: #f5f6f6; }
       .sidebar-header { background: var(--main); color: #fff; padding: 12px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
       .sidebar-header span,.sidebar-header button { color: #fff; }
       .settings-btn { background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 6px; font-size: 13px; }
       .room-tabs { display: flex; background: #e9edef; }
       .room-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; }
       .room-tab.active { background: #fff; border-color: var(--green); font-weight: 700; }
       .users-list { flex: 1; overflow-y: auto; }
       .user-item { padding: 10px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; cursor: pointer; position: relative; }
       .user-item:hover,.user-item.pm-active { background: #e0e0e0; }
       .user-item.muted { opacity: 0.5; }
       .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green); color: #fff; display: grid; place-items: center; font-weight: 700; flex-shrink: 0; }
       .user-name { flex: 1; text-align: right; }
       .admin-tag { font-size: 10px; background: gold; color: #000; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }
       .pm-badge { background: red; color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
       .admin-btns { display: flex; gap: 5px; margin-right: auto; }
       .admin-btns i { font-size: 16px; color: #888; padding: 5px; }
       .admin-btns i:hover { color: red; }

       .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73d1-11e7-911d-60d70fcded21.png'); }
       .chat-header { background: var(--main); color: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
       .chat-header h4 { font-size: 17px; }
       .chat-header.logout-btn { background: rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 14px; }

       .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
       .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; line-height: 1.6; word-wrap: break-word; }
       .msg.me { background: var(--msg-me); align-self: flex-start; }
       .msg.other { background: var(--msg-other); align-self: flex-end; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
       .msg.pm { border: 2px dashed var(--green); }
       .msg.name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
       .msg audio { width: 220px; max-width: 100%; margin-top: 5px; }
       .msg img.chat-img { max-width: 200px; max-height: 200px; border-radius: 8px; margin-top: 5px; cursor: pointer; }
       .msg.time { font-size: 11px; color: #667781; text-align: left; margin-top: 3px; }

       .chat-input { background: #f0f0f0; padding: 10px; display: flex; gap: 8px; align-items: center; position: relative; }
       .chat-input input { flex: 1; padding: 12px 15px; border-radius: 20px; border: none; outline: none; font-size: 16px; }
       .chat-input input:disabled { background: #ddd; }
       .chat-input button { width: 42px; height: 42px; border-radius: 50%; background: var(--green); color: #fff; font-size: 18px; flex-shrink: 0; }
       .chat-input button:disabled { background: #aaa; cursor: not-allowed; }
       .chat-input.icon-btn { background: #fff; color: #555; }
       .chat-input.recording { background: red!important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }

        /* صناديق منبثقة */
       .popup { position: absolute; bottom: 60px; background: #fff; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); padding: 10px; z-index: 5; }
       .emoji-box { left: 10px; width: 280px; height: 200px; overflow-y: auto; }
       .emoji-box span { font-size: 24px; padding: 5px; cursor: pointer; }
       .emoji-box span:hover { background: #f0f0f0; border-radius: 5px; }
       .settings-box { left: 10px; width: 250px; }
       .settings-box h4 { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
       .color-picker span { width: 25px; height: 25px; display: inline-block; border-radius: 50%; margin: 5px; cursor: pointer; border: 2px solid #ccc; }
       .font-picker select { width: 100%; padding: 8px; border-radius: 5px; margin-top: 5px; }

        @media screen and (max-width: 768px) {
           .sidebar { display: none; position: absolute; z-index: 10; height: 100%; width: 85%; }
           .sidebar.active { display: flex; }
           .msg { max-width: 85%; }
           .nav a { width: 33.33%; }
        }
    </style>
</head>
<body>
    <!-- ========== 1. صفحة الدخول ========== -->
    <div id="login_page">
        <div class="header">
            <a href="/">شات اليمن العربي</a>
            <b>أكبر تجمع يمني</b>
        </div>
        <nav class="nav">
            <a href="/">الرئيسية</a>
            <a href="privacy/">الخصوصية</a>
            <a href="terms/">الشروط</a>
        </nav>
        <div class="main">
            <div class="container">
                <div class="error" id="error"></div>
                <div class="login" id="guest_box">
                    <form id="guest_form">
                        <input type="text" id="guest_username" maxlength="20" placeholder="الاسم المستعار" required />
                        <div class="gendiv">
                            <div><input id="male" type="radio" name="gender" value="1" checked /> <label for="male" class="male"><span>ذكر</span></label></div>
                            <div><input id="female" type="radio" name="gender" value="2" /> <label for="female" class="female"><span>أنثى</span></label></div>
                        </div>
                        <input type="submit" class="btn" value="دخول كزائر" />
                    </form>
                </div>
                <div id="roomid" class="room">
                    <h3>أهلاً بك في شات اليمن</h3>
                    <p>غرفة دردشة شباب وبنات اليمن. تعارف، فلة، ونقاش باحترام</p>
                    <button class="btn" id="guest_btn"><i class="fa fa-user"></i> دخول الزوار</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 2. واجهة الشات ========== -->
    <div id="chat_app">
        <div class="chat-layout">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    المتصلون <span id="online_count">1</span>
                    <button class="settings-btn" id="settings_btn"><i class="fa fa-gear"></i></button>
                </div>
                <div class="room-tabs">
                    <div class="room-tab active" data-room="عام">عام</div>
                    <div class="room-tab" data-room="تعارف">تعارف</div>
                    <div class="room-tab" data-room="اليمن">اليمن</div>
                    <div class="room-tab" data-room="فلة">فلة</div>
                </div>
                <div class="users-list" id="users_list"></div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <button class="logout-btn" id="show_users_btn"><i class="fa fa-users"></i></button>
                    <h4 id="room_title">الدردشة العامة</h4>
                    <button class="logout-btn" id="logout_btn">خروج <i class="fa fa-sign-out-alt"></i></button>
                </div>
                <div class="messages" id="messages_box"></div>
                <form class="chat-input" id="chat_form">
                    <button type="button" class="icon-btn" id="emoji_btn"><i class="fa fa-smile"></i></button>
                    <button type="button" class="icon-btn" id="img_btn"><i class="fa fa-paperclip"></i></button>
                    <button type="button" class="icon-btn" id="mic_btn"><i class="fa fa-microphone"></i></button>
                    <input type="file" id="img_input" accept="image/*" class="hide">
                    <input type="text" id="msg_input" placeholder="اكتب رسالتك..." autocomplete="off" />
                    <button type="submit"><i class="fa fa-paper-plane"></i></button>

                    <div class="popup emoji-box hide" id="emoji_box"></div>
                    <div class="popup settings-box hide" id="settings_box">
                        <h4>الإعدادات</h4>
                        <label>لون الخط:</label>
                        <div class="color-picker">
                            <span style="background:#000;" data-color="#000"></span>
                            <span style="background:#e91e63;" data-color="#e91e63"></span>
                            <span style="background:#2196f3;" data-color="#2196f3"></span>
                            <span style="background:#4caf50;" data-color="#4caf50"></span>
                            <span style="background:#ff9800;" data-color="#ff9800"></span>
                        </div>
                        <label>نوع الخط:</label>
                        <div class="font-picker">
                            <select id="font_select">
                                <option value="Tajawal">Tajawal</option>
                                <option value="Cairo">Cairo</option>
                                <option value="Amiri">Amiri</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const $ = id => document.getElementById(id);
    let currentUser = null;
    let currentRoom = 'عام';
    let pmWith = null;
    let isAdmin = false;
    let myId = null;
    let mediaRecorder;
    let audioChunks = [];
    let localMutedUsers = JSON.parse(localStorage.getItem('mutedUsers') || '[]');

    const EMOJIS = ['😂','❤️','😍','😎','😢','😡','👍','👎','🔥','💯','🙏','😜','🤔','😱','🥰','😇','🤣','😭','💔','🎉','🌹','🌙','🇾🇪','✅','❌','⚠️','👋','✌️','🙌','🤝','💬','💡','🚀','⭐','💪','😴','☕','🍵','🏆','💰'];

    // ========== دخول ==========
    $('guest_btn').onclick = () => { $('roomid').style.display = "none"; $('guest_box').style.display = "block"; }
    $('guest_form').onsubmit = e => {
        e.preventDefault();
        const username = $('guest_username').value.trim();
        const gender = document.querySelector('input[name="gender"]:checked').value;
        if (!username) return err("اكتب اسمك");
        currentUser = {name: username, gender: gender == 1? 'male' : 'female'};
        socket.emit('join', currentUser);
    }

    // ========== استقبال من السيرفر ==========
    socket.on('you are', (data) => {
        myId = data.id;
        isAdmin = data.isAdmin;
        $('login_page').style.display = 'none';
        $('chat_app').style.display = 'block';
    });

    socket.on('users list', (users) => {
        $('users_list').innerHTML = '';
        users.forEach(u => addUserToList(u, u.id === myId));
    });

    socket.on('user joined', (user) => {
        addUserToList(user);
        addMessage('system', `${user.name} دخل الغرفة`);
    });

    socket.on('user left', (name) => {
        addMessage('system', `${name} خرج من الغرفة`);
        document.querySelector(`.user-item[data-id="${name}"]`)?.remove();
        $('online_count').innerText = $('users_list').children.length;
    });

    socket.on('message', (data) => addMessage('user', data.content, data.user, data.type));
    socket.on('pm message', (data) => {
        if(pmWith?.id === data.user.id || data.user.id === myId) {
            addMessage('user', data.content, data.user, data.type, true);
        } else {
            $(`pm_${data.user.id}`)?.classList.remove('hide');
        }
    });

    socket.on('system', (msg) => addMessage('system', msg));

    // ========== ميووت + طرد ==========
    socket.on('you muted', (isMuted) => {
        if(isMuted) err("تم كتمك من المشرف");
        else clearerr();
        $('msg_input').disabled = isMuted;
        $('chat_form button[type="submit"]').disabled = isMuted;
    });
    socket.on('kicked', (msg) => { alert(msg); location.reload(); });

    // ========== إرسال ==========
    function sendMessage(content, type) {
        const data = {type, content, pm: pmWith?.id || null};
        socket.emit('message', data);
        addMessage('user', content, currentUser, type, pmWith!== null);
    }

    $('chat_form').onsubmit = e => {
        e.preventDefault();
        const msg = $('msg_input').value.trim();
        if (!msg) return;
        sendMessage(msg, 'text');
        $('msg_input').value = '';
    }

    // ========== 1. تسجيل الصوت ==========
    $('mic_btn').onclick = async () => {
        if (mediaRecorder?.state === 'recording') {
            mediaRecorder.stop();
            $('mic_btn').classList.remove('recording');
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const formData = new FormData();
                formData.append('audio', audioBlob, 'voice.webm');
                fetch('/upload-audio', { method: 'POST', body: formData })
             .then(res => res.json())
             .then(data => sendMessage(data.url, 'audio'));
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            $('mic_btn').classList.add('recording');
        } catch(e) { err("فشل الوصول للميكرفون"); }
    };

    // ========== 2. رفع صورة ==========
    $('img_btn').onclick = () => $('img_input').click();
    $('img_input').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const formData = new FormData();
        formData.append('image', file);
        fetch('/upload', { method: 'POST', body: formData })
     .then(res => res.json())
     .then(data => sendMessage(data.url, 'img'));
    }

    // ========== 3. إيموجي ==========
    $('emoji_btn').onclick = () => $('emoji_box').classList.toggle('hide');
    EMOJIS.forEach(e => { const span = document.createElement('span'); span.innerText = e; span.onclick = () => { $('msg_input').value += e; $('msg_input').focus(); } $('emoji_box').appendChild(span); });

    // ========== 4. إعدادات الخط واللون ==========
    $('settings_btn').onclick = () => $('settings_box').classList.toggle('hide');
    document.querySelectorAll('.color-picker span').forEach(span => {
        span.onclick = () => {
            document.documentElement.style.setProperty('--user-color', span.dataset.color);
            localStorage.setItem('chatColor', span.dataset.color);
            socket.emit('save settings', {font: localStorage.getItem('chatFont'), color: span.dataset.color});
        }
    });
    $('font_select').onchange = e => {
        document.documentElement.style.setProperty('--user-font', e.target.value);
        localStorage.setItem('chatFont', e.target.value);
        socket.emit('save settings', {font: e.target.value, color: localStorage.getItem('chatColor')});
    }
    // تحميل الإعدادات المحفوظة
    if(localStorage.getItem('chatColor')) document.documentElement.style.setProperty('--user-color', localStorage.getItem('chatColor'));
    if(localStorage.getItem('chatFont')) document.documentElement.style.setProperty('--user-font', localStorage.getItem('chatFont'));

    // ========== 5. كتم محلي + ميووت مشرف ==========
    function toggleLocalMute(userId) {
        if(localMutedUsers.includes(userId)) {
            localMutedUsers = localMutedUsers.filter(id => id!== userId);
            $(`user_${userId}`).classList.remove('muted');
        } else {
            localMutedUsers.push(userId);
            $(`user_${userId}`).classList.add('muted');
        }
        localStorage.setItem('mutedUsers', JSON.stringify(localMutedUsers));
    }

    function addUserToList(user, isMe = false) {
        if($(`user_${user.id}`)) return;
        const div = document.createElement('div');
        div.className = 'user-item ' + (localMutedUsers.includes(user.id)? 'muted' : '');
        div.id = `user_${user.id}`;
        div.dataset.id = user.id;
        div.innerHTML = `
            <div class="user-avatar">${user.name.charAt(0)}</div>
            <div class="user-
