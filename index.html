<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن</title>
<style>
body{margin:0;font-family:tahoma;background:url('https://i.imgur.com/3ZQZQZQ.jpg') no-repeat center fixed;background-size:cover;color:#eee}

#loginBox{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999
}
.login-form{
  background:rgba(255,255,255,0.95);padding:25px;border-radius:15px;
  width:340px;box-shadow:0 0 30px rgba(0,0,0,0.5);color:#333
}
.login-form h2{text-align:center;margin:0 0 5px;color:#006699;font-size:28px}
.login-form p{text-align:center;color:#0099cc;margin:0 0 20px;font-size:14px}
.login-form input{
  width:100%;padding:12px;margin:8px 0;
  background:#fff;border:1px solid #ccc;border-radius:8px;
  color:#333;font-size:16px;box-sizing:border-box;text-align:center
}
.login-form button{
  width:100%;padding:12px;margin-top:10px;
  border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer
}
.btn-guest{background:#00aa00}
.btn-member{background:#003344}

#chat{display:none;flex-direction:column;height:100vh}
#header{background:#00aa55;padding:15px;text-align:center;font-weight:bold;font-size:18px}
#messages{flex:1;overflow-y:auto;padding:10px;background:#0f0f0f}
#media-box{padding:8px 10px;background:#1a1a1a;border-top:1px solid #333;display:flex;gap:10px}
#media-box button{padding:8px 12px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#eee;cursor:pointer;font-size:18px}
#media-box button:disabled{cursor:not-allowed;opacity:0.3}
#input-box{display:flex;padding:10px;background:#1a1a1a;border-top:1px solid #333;gap:8px}
#msg{flex:1;padding:10px;border:none;border-radius:8px;background:#2a2a2a;color:#eee;outline:none;font-size:15px}
button.send{padding:10px 20px;background:#00aa55;border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:bold}

.msg-row{display:flex;align-items:flex-start;margin:12px 0;gap:8px}
.msg-row.me{flex-direction:row-reverse}
.avatar{width:45px;height:45px;border-radius:50%;border:2px solid;flex-shrink:0;object-fit:cover;background:#1a1a1a;padding:4px}
.msg-content{flex:1;max-width:75%}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px;color:#888}
.msg-name{font-weight:bold;font-size:14px}
.msg-text{padding:10px 14px;background:#2a2a2a;border-radius:12px;border:1px solid #333;word-wrap:break-word}
.msg-row.me .msg-text{background:#004422;border-color:#00ff88}
</style>
</head>
<body>

<div id="loginBox">
  <div class="login-form">
    <h2>شات اليمن</h2>
    <p>غرفة دردشة شباب وبنات اليمن</p>
    
    <!-- الزرين -->
    <div style="display:flex;gap:10px;margin-bottom:15px">
      <button class="btn-guest" onclick="showGuestForm()">دخول الزوار</button>
      <button class="btn-member" onclick="showMemberForm()">دخول الأعضاء</button>
    </div>

    <!-- فورم الزوار -->
    <div id="guestForm" style="display:none">
      <input type="text" id="inputNameGuest" placeholder="الإسم المستعار" maxlength="20" autocomplete="off">
      
      <div style="display:flex;justify-content:center;gap:40px;margin:15px 0">
        <label style="cursor:pointer;font-size:18px;color:#00aaff;font-weight:bold">
          <input type="radio" name="gender" value="ذكر" checked> ذكر
        </label>
        <label style="cursor:pointer;font-size:18px;color:#ff4499;font-weight:bold">
          <input type="radio" name="gender" value="انثى"> أنثى
        </label>
      </div>
      
      <button class="btn-guest" onclick="enterChatGuest()">دخول</button>
    </div>

    <!-- فورم الأعضاء -->
    <div id="memberForm" style="display:none">
      <input type="text" id="inputNameMember" placeholder="الإسم المستعار" maxlength="20" autocomplete="off">
      <input type="password" id="inputPassMember" placeholder="كلمة المرور" autocomplete="off">
      <button class="btn-member" onclick="enterChatMember()">دخول</button>
    </div>
  </div>
</div>

<div id="chat">
  <div id="header">💬 شات اليمن</div>
  <div id="messages"></div>

  <div id="media-box">
    <button id="btnImage" onclick="sendImage()" title="إرسال صورة">🖼️</button>
    <button id="btnYoutube" onclick="sendYoutube()" title="إرسال يوتيوب">🎵</button>
  </div>

  <div id="input-box">
    <input id="msg" placeholder="اكتب رسالتك..." onkeypress="if(event.key=='Enter')send()">
    <button class="send" onclick="send()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();
var myName, myRank, myGender;

function showGuestForm(){
  document.getElementById('guestForm').style.display = 'block';
  document.getElementById('memberForm').style.display = 'none';
}

function showMemberForm(){
  document.getElementById('memberForm').style.display = 'block';
  document.getElementById('guestForm').style.display = 'none';
}

function enterChatGuest(){
  myName = document.getElementById('inputNameGuest').value.trim();
  myRank = 'زائر';
  myGender = document.querySelector('input[name="gender"]:checked').value;

  if(!myName){ alert('اكتب اسمك أول'); return; }

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  socket.emit('join', {name: myName, rank: myRank, gender: myGender});
}

function enterChatMember(){
  myName = document.getElementById('inputNameMember').value.trim();
  let pass = document.getElementById('inputPassMember').value;

  if(!myName){ alert('اكتب اسمك أول'); return; }
  if(!pass){ alert('اكتب كلمة المرور'); return; }

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  socket.emit('join', {name: myName, password: pass, from: 'member'});
}

socket.on('myData', (data) => {
  myRank = data.rank;
  myGender = data.gender;
  updateMediaButtons();
});

socket.on('system', (data) => {
  let div = document.createElement('div');
  div.style.textAlign = 'center';
  div.style.color = '#00ff88';
  div.style.margin = '8px 0';
  div.style.fontSize = '13px';
  div.style.background = '#1a2a1a';
  div.style.padding = '6px';
  div.style.borderRadius = '8px';
  div.innerHTML = `👋 ${data.text}`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 99999;
});

function updateMediaButtons() {
  let canMedia = ['مميز','مشرف','ادارة','ادمن','مالك'].includes(myRank);
  document.getElementById('btnImage').disabled =!canMedia;
  document.getElementById('btnYoutube').disabled =!canMedia;
}

function getBorderColor(rank, gender) {
  if(gender === 'انثى') {
    if(rank === 'زائر') return '#ff66cc';
    if(rank === 'عضو') return '#ff4499';
    return '#ffdd00';
  }
  if(rank === 'زائر') return '#00aaff';
  if(rank === 'عضو') return '#0088ff';
  return '#ffd700';
}

function getRankNum(rank) {
  if(rank === 'زائر') return '1';
  if(rank === 'عضو') return '2';
  return '👑';
}

socket.on('chat message', (data) => {
  addMessage(data);
  document.getElementById('messages').scrollTop = 99999;
});

socket.on('newMedia', (data) => {
  addMessage(data, true);
  document.getElementById('messages').scrollTop = 99999;
});

function addMessage(data, isMedia=false) {
  let row = document.createElement('div');
  row.className = 'msg-row' + (data.name == myName? ' me' : '');

  let rankNum = getRankNum(data.rank);
  let borderColor = getBorderColor(data.rank, data.gender);
  let nameColor = data.rank === 'مميز'? '#ffd700' : '#00ff88';

  let content = isMedia?
    (data.type === 'image'? `<img src="${data.url}" style="max-width:200px;border-radius:8px;margin-top:5px">` :
     `<iframe width="200" height="113" src="https://www.youtube.com/embed/${(data.url.split('v=')[1]||data.url.split('youtu.be/')[1]).split('&')[0]}" frameborder="0" allowfullscreen style="border-radius:8px;margin-top:5px"></iframe>`)
    : data.text;

  row.innerHTML = `
    <img src="${data.avatar}" class="avatar" style="border-color:${borderColor}" onerror="this.src='https://i.pravatar.cc/45?u=${data.name}'">
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-name" style="color:${nameColor}">${rankNum} ${data.name}</span>
        <span>${data.time}</span>
      </div>
      <div class="msg-text">${content}</div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
}

function send(){
  let msg = document.getElementById('msg');
  if(msg.value.trim()){
    socket.emit('chat message', {
      text: msg.value,
      time: new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})
    });
    msg.value = '';
  }
}

function sendImage() {
  if(!['مميز','مشرف','ادارة','ادمن','مالك'].includes(myRank)) {
    alert('هذي الميزة للمميز فقط 💎');
    return;
  }
  let url = prompt('حط رابط الصورة:');
  if(url) socket.emit('sendMedia', {type:'image', url:url, time:new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})});
}

function sendYoutube() {
  if(!['مميز','مشرف','ادارة','ادمن','مالك'].includes(myRank)) {
    alert('هذي الميزة للمميز فقط 💎');
    return;
  }
  let url = prompt('حط رابط يوتيوب:');
  if(url) socket.emit('sendMedia', {type:'youtube', url:url, time:new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})});
}

socket.on('error', (msg) => alert(msg));
</script>
</body>
  </html>
