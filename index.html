<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myName = '';

function toggleGateTab(type){
document.querySelectorAll('.gate-tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById('gate-visitor-panel').style.display='none';
document.getElementById('gate-member-panel').style.display='none';
document.getElementById('gate-register-panel').style.display='none';
if(type=='visitor'){document.getElementById('tab-v-btn').classList.add('active'); document.getElementById('gate-visitor-panel').style.display='block'}
else if(type=='member'){document.getElementById('tab-m-btn').classList.add('active'); document.getElementById('gate-member-panel').style.display='block'}
else{document.getElementById('tab-r-btn').classList.add('active'); document.getElementById('gate-register-panel').style.display='block'}
}

function joinChat(isMember=false){
myName = isMember ? document.getElementById('m-name').value : document.getElementById('v-name').value;
const gender = document.getElementById('v-gender').value;
if(!myName || (!isMember && !gender)){ alert('اكتب اسمك واختر الجنس'); return; }
document.getElementById('gate-container').style.display='none';
document.getElementById('chat-container').style.display='flex';
socket.emit('join', {name: myName, gender: gender});
}

function register(){
alert('تم التسجيل بنجاح! سجل دخول الحين');
toggleGateTab('member');
}

function sendMsg(){
const input = document.getElementById('msg-input');
if(input.value.trim()){
socket.emit('chat message', {name: myName, text: input.value});
input.value='';
}
}

// دالة التاريخ والوقت: يوم/شهر ساعة:دقيقة ص/م
function getDateNow(){
const d = new Date();
const day = d.getDate();
const month = d.getMonth() + 1;
let hours = d.getHours();
const minutes = d.getMinutes().toString().padStart(2,'0');
const ampm = hours >= 12 ? 'م' : 'ص';
hours = hours % 12;
hours = hours ? hours : 12;
return `${day}/${month} ${hours}:${minutes} ${ampm}`;
}

socket.on('chat message', (data)=>{
const div = document.createElement('div');
div.className = 'msg';

if(data.name==='النظام'){
  // رسالة النظام وسط الشات بدون وقت
  div.style.textAlign = 'center';
  div.style.color = '#aaa';
  div.style.fontSize = '13px';
  div.style.background = 'transparent';
  div.style.margin = '8px 0';
  div.innerHTML = data.text;
} else {
  // الرسالة العادية مع الوقت والتاريخ
  const time = data.time || getDateNow();
  div.innerHTML = `<b style="color:#3498db">${data.name}:</b> ${data.text} <span style="font-size:11px;color:#666;margin-right:5px">${time}</span>`;
}

document.getElementById('messages').appendChild(div);
document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
});
  </script>
