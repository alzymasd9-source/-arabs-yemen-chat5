<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شات بلس الملكي</title>
<style>
body{background:#121212;color:white;text-align:center;font-family:Arial}
button{padding:10px 20px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.active{background:#3498db;color:white}
.inactive{background:#333;color:#aaa}
.panel{display:none;margin-top:20px}
.panel.show{display:block}
</style>
</head>
<body>
<h2>🌙 شات بلس الملكي</h2>

<button id="v" class="active" onclick="show('v')">زائر سريع</button>
<button id="m" class="inactive" onclick="show('m')">الأعضاء</button>
<button id="r" class="inactive" onclick="show('r')">تسجيل</button>

<div id="v-panel" class="panel show">
<p>لوحة الزائر شغالة</p>
</div>

<div id="m-panel" class="panel">
<p>لوحة الأعضاء - اكتب اسمك وكلمة السر</p>
<input placeholder="الاسم المستخدم"><br>
<input type="password" placeholder="الباسورد">
</div>

<div id="r-panel" class="panel">
<p>لوحة التسجيل - انشئ حساب جديد</p>
<input placeholder="الاسم"><br>
<input type="password" placeholder="كلمة السر">
</div>

<script>
function show(id){
document.querySelectorAll('button').forEach(b=>{b.className='inactive'});
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
document.getElementById(id).className='active';
document.getElementById(id+'-panel').classList.add('show');
}
</script>
</body>
</html>
