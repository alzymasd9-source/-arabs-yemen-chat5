<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات الرتب</title>
<style>
body{margin:0;font-family:tahoma;background:#0a0a0a;color:#eee}
#chat{display:flex;flex-direction:column;height:100vh}
#header{background:#00aa55;padding:15px;text-align:center;font-weight:bold}
#messages{flex:1;overflow-y:auto;padding:10px}
#media-box{padding:8px 10px;background:#1a1a1a;border-top:1px solid #333;display:flex;gap:10px}
#media-box button{padding:8px 12px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#eee;cursor:pointer;font-size:18px}
#media-box button:disabled{cursor:not-allowed}
#input-box{display:flex;padding:10px;background:#1a1a1a;border-top:1px solid #333}
#msg{flex:1;padding:10px;border:none;border-radius:8px;background:#2a2a2a;color:#eee;outline:none}
button.send{margin-right:8px;padding:10px 20px;background:#00aa55;border:none;border-radius:8px;color:#fff;cursor:pointer}

.msg-row{display:flex;align-items:flex-start;margin:12px 0;gap:8px}
.msg-row.me{flex-direction:row-reverse}
.avatar{width:45px;height:45px;border-radius:50%;border:2px solid;flex-shrink:0;object-fit:cover}
.msg-content{flex:1;max-width:75%}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px;color:#888}
.msg-name{font-weight:bold;font-size:14px}
.msg-text{padding:10px 14px;background:#2a2a2a;border-radius:12px;border:1px solid #333;word-wrap:break-word}
.msg-row.me.msg-text{background:#004422;border-color:#00ff88}
.report-btn{cursor:pointer;font-size:18px;color:#666;padding:0 5px}
.report-menu{display:none;position:absolute;background:#1a1a1a;border:1px solid #444;border-radius:8px;padding:5px;z-index:100;left:0}
.report-menu div{padding:8px 12px;cursor:pointer;font-size:13px;color:#fff}
.report-menu div:hover{background:#2a2a2a}
.report-wrapper{position:relative}
</style>
</head>
<body>
<div id="chat">
  <div id="header">💬 شات الرتب</div>
  <div id="messages"></div>

  <div id="media-box">
    <button id="btnImage" onclick="sendImage()" title="إرسال صورة">🖼️</button>
    <button id="btnYoutube" onclick="sendYoutube()" title="إرسال يوتيوب">🎵</button>
  </div>

  <div id="input-box">
    <input id="msg" placeholder="اكتب رسالتك..." onkeypress="if(event.key=='Enter')send()">
    <button class="send" onclick="send()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();
var myName = prompt("اسمك؟") || "زائر";
var myRank = prompt("رتبتك؟ زائر / عضو / مميز", "زائر");

socket.emit('join', {name: myName, rank: myRank});

socket.on('myData', (data) => {
  myRank = data.rank;
  updateMediaButtons();
});

function updateMediaButtons() {
  let canMedia = canSendMedia(myRank);
  document.getElementById('btnImage').disabled =!canMedia;
  document.getElementById('btnYoutube').disabled =!canMedia;
  document.getElementById('btnImage').style.opacity = canMedia? '1' : '0.3';
  document.getElementById('btnYoutube').style.opacity = canMedia? '1' : '0.3';
}

function canSendMedia(rank) {
  return ['مميز','مشرف','ادارة','ادمن','مالك'].includes(rank);
}

// استقبال الرسائل
socket.on('chat message', (data) => {
  if(data.name === 'النظام'){
    let div = document.createElement('div');
    div.style.textAlign = 'center';
    div.style.color = '#777';
    div.style.margin = '10px 0';
    div.innerHTML = `👋 ${data.text}`;
    document.getElementById('messages').appendChild(div);
  } else {
    addMessage(data);
  }
  document.getElementById('messages').scrollTop = 99999;
});

// استقبال الميديا
socket.on('newMedia', (data) => {
  addMessage(data, true);
  document.getElementById('messages').scrollTop = 99999;
});

function addMessage(data, isMedia=false) {
  let row = document.createElement('div');
  row.className = 'msg-row' + (data.name == myName? ' me' : '');

  let rankNum = data.rank === 'زائر'? '1' : data.rank === 'عضو'? '2' : '👑';
  let rankColor = data.rank === 'زائر'? '#ff66cc' : data.rank === 'عضو'? '#00aaff' : '#ffd700';
  let nameColor = data.rank === 'مميز'? '#ffd700' : '#00ff88';

  let content = isMedia?
    (data.type === 'image'? `<img src="${data.url}" style="max-width:200px;border-radius:8px">` :
     `<iframe width="200" height="113" src="https://www.youtube.com/embed/${data.url.split('v=')[1]||data.url.split('youtu.be/')[1]}" frameborder="0" allowfullscreen style="border-radius:8px"></iframe>`)
    : data.text;

  row.innerHTML = `
    <img src="${data.avatar}" class="avatar" style="border-color:${rankColor}">
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-name" style="color:${nameColor}">${rankNum} ${data.name}</span>
        <div class="report-wrapper">
          <span class="report-btn" onclick="toggleReport(this)">⋯</span>
          <div class="report-menu">
            <div onclick="report('${data.name}','مسيئ')">مسيئ</div>
            <div onclick="report('${data.name}','احتيال')">احتيال</div>
            <div onclick="report('${data.name}','غير ذلك')">غير ذلك</div>
          </div>
        </div>
        <span>${data.time}</span>
      </div>
      <div class="msg-text">${content}</div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
}

function toggleReport(btn){
  let menu = btn.nextElementSibling;
  document.querySelectorAll('.report-menu').forEach(m => m.style.display='none');
  menu.style.display = menu.style.display=='block'? 'none' : 'block';
}

function report(user, reason){
  alert(`تم التبليغ عن ${user} - السبب: ${reason}`);
  document.querySelectorAll('.report-menu').forEach(m => m.style.display='none');
}

function send(){
  let msg = document.getElementById('msg');
  if(msg.value.trim()){
    socket.emit('chat message', {
      text: msg.value,
      time: new Date().toLocaleString('ar-EG',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
    });
    msg.value = '';
  }
}

function sendImage() {
  if(!canSendMedia(myRank)) {
    alert('هذي الميزة للمميز فقط 💎');
    return;
  }
  let url = prompt('حط رابط الصورة:');
  if(url) socket.emit('sendMedia', {type:'image', url:url, time:new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})});
}

function sendYoutube() {
  if(!canSendMedia(myRank)) {
    alert('هذي الميزة للمميز فقط 💎');
    return;
  }
  let url = prompt('حط رابط يوتيوب:');
  if(url) socket.emit('sendMedia', {type:'youtube', url:url, time:new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})});
}

socket.on('error', (msg) => alert(msg));
</script>
</body>
  </html>
