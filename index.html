<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات الرتب</title>
<style>
body{margin:0;font-family:tahoma;background:#0a0a0a;color:#eee}

/* مربع الدخول */
#loginBox{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:9999
}
.login-form{
  background:#1a1a1a;padding:30px;border-radius:15px;border:2px solid #00aa55;
  width:320px;box-shadow:0 0 30px #00aa55
}
.login-form h2{text-align:center;margin:0 0 20px;color:#00aa55}
.login-form input,.login-form select{
  width:100%;padding:12px;margin:10px 0;
  background:#2a2a2a;border:1px solid #444;border-radius:8px;
  color:#eee;font-size:16px;box-sizing:border-box
}
.login-form select{cursor:pointer}
.login-form button{
  width:100%;padding:12px;margin-top:15px;
  background:#00aa55;border:none;border-radius:8px;
  color:#fff;font-size:16px;font-weight:bold;cursor:pointer
}
.login-form button:hover{background:#00cc66}

/* الشات */
#chat{display:none;flex-direction:column;height:100vh}
#header{background:#00aa55;padding:15px;text-align:center;font-weight:bold;font-size:18px}
#messages{flex:1;overflow-y:auto;padding:10px;background:#0f0f0f}
#media-box{padding:8px 10px;background:#1a1a1a;border-top:1px solid #333;display:flex;gap:10px}
#media-box button{padding:8px 12px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#eee;cursor:pointer;font-size:18px}
#media-box button:disabled{cursor:not-allowed;opacity:0.3}
#input-box{display:flex;padding:10px;background:#1a1a1a;border-top:1px solid #333;gap:8px}
#msg{flex:1;padding:10px;border:none;border-radius:8px;background:#2a2a2a;color:#eee;outline:none;font-size:15px}
button.send{padding:10px 20px;background:#00aa55;border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:bold}

.msg-row{display:flex;align-items:flex-start;margin:12px 0;gap:8px}
.msg-row.me{flex-direction:row-reverse}
.avatar{width:45px;height:45px;border-radius:50%;border:2px solid;flex-shrink:0;object-fit:cover;background:#1a1a1a;padding:4px}
.msg-content{flex:1;max-width:75%}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px;color:#888}
.msg-name{font-weight:bold;font-size:14px}
.msg-text{padding:10px 14px;background:#2a2a2a;border-radius:12px;border:1px solid #333;word-wrap:break-word}
.msg-row.me.msg-text{background:#004422;border-color:#00ff88}
</style>
</head>
<body>

<!-- مربع الدخول -->
<div id="loginBox">
  <div class="login-form">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="inputName" placeholder="اكتب اسمك..." maxlength="20">
    <select id="inputRank">
      <option value="زائر">زائر 1</option>
      <option value="عضو">عضو 2</option>
      <option value="مميز">مميز 👑</option>
    </select>
    <select id="inputGender">
      <option value="ذكر">ذكر 💙</option>
      <option value="انثى">أنثى 💗</option>
      <option value="جنس3">نوع آخر 🤍</option>
    </select>
    <button onclick="enterChat()">دخول</button>
  </div>
</div>

<!-- الشات -->
<div id="chat">
  <div id="header">💬 شات الرتب</div>
  <div id="messages"></div>

  <div id="media-box">
    <button id="btnImage" onclick="sendImage()" title="إرسال صورة">🖼️</button>
    <button id="btnYoutube" onclick="sendYoutube()" title="إرسال يوتيوب">🎵</button>
  </div>

  <div id="input-box">
    <input id="msg" placeholder="اكتب رسالتك..." onkeypress="if(event.key=='Enter')send()">
    <button class="send" onclick="send()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();
var myName, myRank, myGender;

function enterChat(){
  myName = document.getElementById('inputName').value.trim();
  myRank = document.getElementById('inputRank').value;
  myGender = document.getElementById('inputGender').value;

  if(!myName){
    alert('اكتب اسمك أول');
    return;
  }

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';

  socket.emit('join', {name: myName, rank: myRank, gender: myGender});
}

socket.on('myData', (data) => {
  myRank = data.rank;
  myGender = data.gender;
  updateMediaButtons();
});

socket.on('system', (data) => {
  let div = document.createElement('div');
  div.style.textAlign = 'center';
  div.style.color = '#00ff88';
  div.style.margin = '8px 0';
  div.style.fontSize = '13px';
  div.style.background = '#1a2a1a';
  div.style.padding = '6px';
  div.style.borderRadius = '8px';
  div.innerHTML = `👋 ${data.text}`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 99999;
});

function updateMediaButtons() {
  let canMedia = ['مميز','مشرف','ادارة','ادمن','مالك'].includes(myRank);
  document.getElementById('btnImage').disabled =!canMedia;
  document.getElementById('btnYoutube').disabled =!canMedia;
}

function getBorderColor(rank, gender) {
  if(gender === 'انثى') {
    if(rank === 'زائر') return '#ff66cc';
    if(rank === 'عضو') return '#ff4499';
    return '#ffdd00';
  }
  if(gender === 'جنس3') {
    if(rank === 'زائر') return '#ffffff';
    if(rank === 'عضو') return '#cccccc';
    return '#eeeeee';
  }
  if(rank === 'زائر') return '#00aaff';
  if(rank === 'عضو') return '#0088ff';
  return '#ffd700';
}

function getRankNum(rank) {
  if(rank === 'زائر') return '1';
  if(rank === 'عضو') return '2';
  return '👑';
}

socket.on('chat message', (data) => {
  addMessage(data);
  document.getElementById('messages').scrollTop = 99999;
});

socket.on('newMedia', (data) => {
  addMessage(data, true);
  document.getElementById('messages').scrollTop = 99999;
});

function addMessage(data, isMedia=false) {
  let row = document.createElement('div');
  row.className = 'msg-row' + (data.name == myName? ' me' : '');

  let rankNum = getRankNum(data.rank);
  let borderColor = getBorderColor(data.rank, data.gender);
  let nameColor = data.rank === 'مميز'? '#ffd700' : '#00ff88';

  let content = isMedia?
    (data.type === 'image'? `<img src="${data.url}" style="max-width:200px;border-radius:8px;margin-top:5px">` :
     `<iframe width="200" height="113" src="https://www.youtube.com/embed/${(data.url.split('v=')[1]||data.url.split('youtu.be/')[1]).split('&')[0]}" frameborder="0" allowfullscreen style="border-radius:8px;margin-top:5px"></iframe>`)
    : data.text;

  row.innerHTML = `
    <img src="${data.avatar}" class="avatar" style="border-color:${borderColor}" onerror="this.src='https://i.pravatar.cc/45?u=${data.name}'">
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-name" style="color:${nameColor}">${rankNum} ${data.name}</span>
        <span>${data.time}</span>
      </div>
      <div class="msg-text">${content}</div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
}

function send(){
  let msg = document.getElementById('msg');
  if(msg.value.trim()){
    socket.emit('chat message', {
      text: msg.value,
      time: new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})
    });
    msg.value = '';
  }
}

function sendImage() {
  if(!['مميز','مشرف','ادارة','ادمن','مالك'].includes(myRank)) {
    alert('هذي الميزة للمميز فقط 💎');
    return;
  }
  let url = prompt('حط رابط الصورة:');
  if(url) socket.emit('sendMedia', {type:'image', url:url, time:new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})});
}

function sendYoutube() {
  if(!['مميز','مشرف','ادارة','ادمن','مالك'].includes(myRank)) {
    alert('هذي الميزة للمميز فقط 💎');
    return;
  }
  let url = prompt('حط رابط يوتيوب:');
  if(url) socket.emit('sendMedia', {type:'youtube', url:url, time:new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'})});
}

socket.on('error', (msg) => alert(msg));
</script>
</body>
  </html>
